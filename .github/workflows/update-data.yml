name: Update K-Star Hub data

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest news & bump banner
        run: node scripts/fetch-news.mjs

      - name: Commit & push if changed
        run: |
          git config user.name  "K-Star Hub Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "Pushed changes."
          fi
